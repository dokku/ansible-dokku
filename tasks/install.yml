- name: packagecloud dokku apt key
  get_url:
    url: https://packagecloud.io/dokku/dokku/gpgkey
    dest: /etc/apt/trusted.gpg.d/dokku.asc
    mode: '0644'
    force: true
  tags:
  - dokku

# apt_repository is deprecated (removal in ansible-core 2.25) and its
# suggested replacement, deb822_repository, requires ansible-core 2.15+,
# which would break this role's min_ansible_version. Writing the sources
# file directly avoids both the deprecation and the version bump.
- name: dokku repo
  copy:
    dest: /etc/apt/sources.list.d/dokku.list
    content: |
      deb https://packagecloud.io/dokku/dokku/{{ ansible_facts["distribution"] | lower }} {{ ansible_facts["distribution_release"] }} main
    mode: '0644'
  register: dokku_repo
  tags:
  - dokku

# apt_repository refreshed the cache by default (update_cache: yes); do the
# same here so the package install tasks below see the new repo. This can't
# be a handler: the cache must be refreshed before the install tasks run,
# whereas handlers only fire at the end of the play.
- name: update apt cache for dokku repo  # noqa: no-handler
  apt:
    update_cache: true
  when: dokku_repo is changed
  tags:
  - dokku

- name: debconf dokku/hostname
  debconf:
    name: dokku
    question: 'dokku/hostname'
    value: '{{ dokku_hostname }}'
    vtype: 'string'
  tags:
  - dokku

- name: debconf dokku/key_file
  debconf:
    name: dokku
    question: 'dokku/key_file'
    value: '{{ dokku_key_file }}'
    vtype: 'string'
  tags:
  - dokku

- name: debconf dokku/skip_key_file
  debconf:
    name: dokku
    question: 'dokku/skip_key_file'
    value: '{{ dokku_skip_key_file }}'
    vtype: 'boolean'
  tags:
  - dokku

- name: debconf dokku/vhost_enable
  debconf:
    name: dokku
    question: 'dokku/vhost_enable'
    value: '{{ dokku_vhost_enable }}'
    vtype: 'boolean'
  tags:
  - dokku

- name: debconf dokku/web_config
  debconf:
    name: dokku
    question: 'dokku/web_config'
    value: '{{ dokku_web_config }}'
    vtype: 'boolean'
  tags:
  - dokku

# this can be removed in July 2021
# (package pinning deprecated).
- name: package pinning
  include_tasks: install-pin.yml
  with_dict:
    plugn: "{{ plugn_version }}"
    sshcommand: "{{ sshcommand_version }}"
    herokuish: "{{ herokuish_version }}"
    dokku: "{{ dokku_version }}"
  tags:
  - dokku
  - dokku-install

# note: this is necessary since the apt module with "state: present" (below)
# does *not* check whether the package version agrees with the pinned version.
# Cannot be done in the pinning loop since all packages need to be unpinned
# (or you can get version conflicts).
- name: install pinned package
  apt:
    name: "{{ item.key }}={{ item.value }}"
  with_dict:
    plugn: "{{ plugn_version }}"
    sshcommand: "{{ sshcommand_version }}"
    herokuish: "{{ herokuish_version }}"
    dokku: "{{ dokku_version }}"
  when: item.value | default('') != ''

- name: install dokku packages
  apt:
    name:
    - plugn
    - sshcommand
    - herokuish
    - dokku
    state: "{{ dokku_packages_state }}"
  tags:
  - dokku
  - dokku-install

- name: write vhost
  when: dokku_vhost_enable | bool
  copy:
    content: "{{ dokku_hostname }}"
    dest: /home/dokku/VHOST
    mode: preserve
  tags:
  - dokku
  - dokku-install
